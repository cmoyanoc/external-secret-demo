# 3. SecretStore usando Autenticación Kubernetes (JWT)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: eso-demo
spec:
  provider:
    vault:
      server: "http://vault.vault-cmc.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-role" # El rol que creamos en vault
          serviceAccountRef:
            name: eso-vault-sa # La ServiceAccount que creamos en 02
