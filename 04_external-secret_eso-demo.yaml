# 4. ExternalSecret: define donde se guardan los secretos y como se mapean
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials-es
  namespace: eso-demo
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    # Este es el nombre del Secreto de K8s que ESO creará automáticamente
    name: db-secret-to-use
    creationPolicy: Owner
  data:
    # Variable a inyectar en OpenShift -> Ruta en Vault
    - secretKey: DB_USER
      remoteRef:
        key: secret/myapp/database
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/myapp/database
        property: password
